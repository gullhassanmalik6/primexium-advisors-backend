services:
  - type: web
    name: primexium-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: Primexium Advisors API
      - key: DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: primexium-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: primexium-db
    plan: free
